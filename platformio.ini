; =============================================================================
; Q-Ring — p5.js sketch runner on Waveshare RP2040-LCD-1.28
; =============================================================================

[env:q_ring]
platform              = https://github.com/maxgerhardt/platform-raspberrypi.git
board                 = pico
framework             = arduino
board_build.core      = earlephilhower

; 1 MB LittleFS partition. Sketches are pushed over USB Serial by the browser
; companion app (tools/qring-companion/index.html). MSC drive was tried but
; the FatFS FTL layer hung repeatedly after partition state from prior
; flashes; LittleFS is the format PlatformIO builds natively and mounts
; reliably.
board_build.filesystem_size = 1m

; USB descriptors — Q-Ring branding in the OS
board_build.arduino.earlephilhower.usb_manufacturer = Processing Foundation Friends
board_build.arduino.earlephilhower.usb_product      = Q-Ring

monitor_speed   = 115200
upload_protocol = picotool

build_flags =
    -DTARGET_FPS=60
    -DCS_PLATFORM=0           ; CS_P_CUSTOM — see src/vendor/mjs/platform_custom.h
    -DMJS_AGGREGATE_ERRORS=1
    -I src/vendor/mjs

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
